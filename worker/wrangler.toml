name = "ziscus"
main = "src/index.ts"
compatibility_date = "2025-09-27"

# Static assets — serves the landing site at ziscus.com
# API routes (/submit, /comments/*, /admin/*) are handled by the Worker
# Everything else falls through to static files from site/_site/
[assets]
directory = "../site/_site"
binding = "ASSETS"
# Let the Worker handle all requests — ASSETS only serves via env.ASSETS.fetch()
serve_directly = false

[[d1_databases]]
binding = "DB"
database_name = "ziscus-comments"
database_id = "aa367a7e-fa94-4e0a-bcd6-11af1071545c"

[vars]
ALLOWED_ORIGINS = "ziscus.com,ziscus.hdz.workers.dev"
MODERATION = "off"
RATE_LIMIT = "30"
GITHUB_REPO = "HectorZarate/ziscus"

# Secrets — set via `wrangler secret put`, never commit values:
# ADMIN_SECRET — for approving/rejecting comments
# GITHUB_TOKEN — for repository_dispatch rebuild triggers
