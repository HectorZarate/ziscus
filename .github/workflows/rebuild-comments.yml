name: Rebuild comments
on:
  repository_dispatch:
    types: [rebuild-comments]

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10 }
      - uses: actions/setup-node@v4
        with: { node-version: 22 }

      - name: Install rsslobster
        run: |
          git clone --depth 1 https://github.com/HectorZarate/rsslobster.git /tmp/rsslobster
          cd /tmp/rsslobster
          pnpm install --frozen-lockfile
          pnpm build
          pnpm link --global

      - name: Regenerate site
        run: cd site && rsslobster regenerate

      - name: Export backup
        run: npx ziscus export --output backups/ --endpoint https://ziscus.com
        env:
          ZISCUS_ADMIN_SECRET: ${{ secrets.ZISCUS_ADMIN_SECRET }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/_site/ backups/
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "rebuild: bake comments + backup for ${{ github.event.client_payload.slug }}"
          git push
